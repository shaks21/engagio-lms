---
services:
  postgres:
    image: postgres:17-alpine
    container_name: engagio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: engagio
      POSTGRES_PASSWORD: engagio_secret
      POSTGRES_DB: engagio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engagio -d engagio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: engagio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: engagio-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: engagio-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: engagio-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://engagio-kafka:29092,PLAINTEXT_HOST://localhost:9092

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./livekit.yaml:/etc/livekit/config.yaml:ro
    environment:
      # Force port range via environment (YAML parser workaround)
      - LIVEKIT_RTC_PORT_RANGE_START=50000
      - LIVEKIT_RTC_PORT_RANGE_END=60000
      - LIVEKIT_RTC_UDP_PORT=7882
      - LIVEKIT_NODE_IP=164.68.119.230
    command: ["--config", "/etc/livekit/config.yaml", "--node-ip", "164.68.119.230"]
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: engagio-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@engagio.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
